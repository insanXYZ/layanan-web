services:
  frontend-perpus:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-perpus
    restart: unless-stopped
    depends_on:
      - backend-perpus

  backend-perpus:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-perpus
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/public:/app/public
    depends_on:
      - mysql-perpus

  mysql-perpus:
    image: mysql:latest
    container_name: mysql-perpus
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1601
      MYSQL_DATABASE: perpus
    volumes:
      - ./mysql_data:/var/lib/mysql

  nginx-perpus:
    image: nginx:alpine
    container_name: nginx-perpus
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - frontend-perpus
      - backend-perpus
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public/uploads:/usr/share/nginx/html/uploads:ro
